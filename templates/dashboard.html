<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard • School Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #1f2933, #0b0f14);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .glass-soft {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .shadow-soft {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
        }

        .fluid-xl { font-size: clamp(1.75rem, 6vw, 2.5rem); }
        .fluid-lg { font-size: clamp(1.25rem, 4.5vw, 1.75rem); }
        .fluid-base { font-size: clamp(0.875rem, 3.5vw, 1rem); }
        .fluid-sm { font-size: clamp(0.75rem, 3vw, 0.875rem); }
    </style>
</head>

<body class="text-white">

<div class="w-full min-h-screen flex justify-center px-3 py-6">
    <div class="w-full max-w-[520px]">

        <!-- HEADER -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <p class="text-white/50 fluid-sm">Current balance</p>
                <h1 class="fluid-xl font-semibold tracking-tight">${{ acc[1] }}</h1>
            </div>
            <div class="glass w-11 h-11 rounded-full flex items-center justify-center text-lg shadow-soft">👤</div>
        </div>

        <!-- ACCOUNT CARD -->
        <div class="glass shadow-soft rounded-3xl p-5 mb-6">
            <p class="text-white/50 fluid-sm mb-2">Account number</p>
            <p class="font-mono tracking-widest fluid-lg break-all">{{ acc[0] }}</p>

            <div class="flex gap-2 mt-4">
                <span class="glass-soft rounded-xl px-3 py-1 fluid-sm">STUDENT</span>
            </div>
        </div>

        <!-- QUICK ACTIONS -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <a href="/transfer" class="glass rounded-2xl py-5 flex flex-col items-center justify-center hover:bg-white/10 transition">
                <img src="https://img.icons8.com/?size=100&id=Oiq7qkj0YwmM&format=png&color=000000" class="w-8 h-8 mb-2" />
                <span class="fluid-sm">Transfer</span>
            </a>
            <a href="/transactions" class="glass rounded-2xl py-5 flex flex-col items-center justify-center hover:bg-white/10 transition">
                <img src="https://img.icons8.com/?size=100&id=RbbYFLGNyoFg&format=png&color=000000" class="w-8 h-8 mb-2" />
                <span class="fluid-sm">History</span>
            </a>
        </div>

        <!-- LAST TRANSACTIONS -->
        <div class="glass rounded-3xl p-5 mb-24">
            <div class="flex items-center justify-between mb-4">
                <h2 class="fluid-base font-medium">Recent activity</h2>
                <a href="/transactions" class="fluid-sm text-white/50 hover:text-white">See all →</a>
            </div>

            <div class="space-y-3">
                <div class="glass-soft rounded-2xl p-3 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-green-400/20 text-green-300 flex items-center justify-center">↓</div>
                        <div>
                            <p class="fluid-base">Top up</p>
                            <p class="fluid-sm text-white/40">Today · 14:30</p>
                        </div>
                    </div>
                    <span class="text-green-400 fluid-base font-medium">+ $50</span>
                </div>

                <div class="glass-soft rounded-2xl p-3 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-red-400/20 text-red-300 flex items-center justify-center">↑</div>
                        <div>
                            <p class="fluid-base">Transfer</p>
                            <p class="fluid-sm text-white/40">Yesterday · 09:15</p>
                        </div>
                    </div>
                    <span class="text-red-400 fluid-base font-medium">- $20</span>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div class="glass fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] max-w-[420px]
                    rounded-2xl py-2 flex justify-around items-center">
            <a href="/dashboard" class="text-lg p-3 rounded-xl bg-white/10">🏠</a>
            <a href="/transactions" class="text-lg p-3 rounded-xl hover:bg-white/5 transition">📊</a>
            <a href="/logout" class="text-lg p-3 rounded-xl hover:bg-white/5 transition">🚪</a>
        </div>

    </div>
</div>

</body>
</html>
