<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfer • School Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #1f2933, #0b0f14);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .glass-soft {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .shadow-soft {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
        }

        .fluid-title {
            font-size: clamp(1.25rem, 5vw, 1.75rem);
        }

        .fluid-base {
            font-size: clamp(0.875rem, 3.5vw, 1rem);
        }

        .fluid-sm {
            font-size: clamp(0.75rem, 3vw, 0.875rem);
        }
    </style>
</head>

<body class="text-white">

<!-- PAGE WRAPPER (SAME AS TRANSACTIONS) -->
<div class="w-full min-h-screen flex justify-center px-3 py-6">
    <div class="w-full max-w-[520px]">

        <!-- HEADER -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <p class="text-white/50 fluid-sm">Money transfer</p>
                <h1 class="fluid-title font-semibold">Send money</h1>
            </div>
            <a href="/dashboard" class="glass rounded-full px-3 py-2 text-sm hover:bg-white/10 transition">
                ← Back
            </a>
        </div>

        <!-- TRANSFER CARD -->
        <div class="glass shadow-soft rounded-3xl p-5 mb-6">
            <form method="post" class="space-y-4">

                <div>
                    <label class="block text-white/60 fluid-sm mb-1">Recipient account</label>
                    <input name="to" required
                        placeholder="e.g. SBXXXXXX"
                        class="w-full glass-soft border border-white/10 px-4 py-3 rounded-xl
                               outline-none focus:border-white/30 transition" />
                </div>

                <div>
                    <label class="block text-white/60 fluid-sm mb-1">Amount</label>
                    <input name="amount" type="number" step="0.01" required
                        placeholder="$0.00"
                        class="w-full glass-soft border border-white/10 px-4 py-3 rounded-xl
                               outline-none focus:border-white/30 transition" />
                </div>

                <button type="submit"
                    class="w-full mt-4 py-3 rounded-xl font-semibold
                           bg-white text-black hover:bg-white/90 transition">
                    Send money
                </button>
            </form>

            {% if msg %}
            <p class="text-green-400 text-center mt-4 fluid-base">{{ msg }}</p>
            {% endif %}
        </div>

        <!-- INFO -->
        <p class="text-center text-white/40 fluid-sm mt-2">
            Transfers are instant and cannot be undone
        </p>

        <!-- BOTTOM NAV -->
        <div class="glass fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] max-w-[420px]
                    rounded-2xl py-2 flex justify-around items-center">
            <a href="/dashboard" class="text-lg p-3 rounded-xl hover:bg-white/5 transition">🏠</a>
            <a href="/transactions" class="text-lg p-3 rounded-xl hover:bg-white/5 transition">📊</a>
            <a href="/logout" class="text-lg p-3 rounded-xl hover:bg-white/5 transition">🚪</a>
        </div>

    </div>
</div>

</body>
</html>
