<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Create Account • School Bank</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2933" />

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json" />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #1f2933, #0b0f14);
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .glass-soft {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .shadow-soft {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
        }

        .fluid-title {
            font-size: clamp(1.5rem, 6vw, 2rem);
        }

        .fluid-base {
            font-size: clamp(0.875rem, 3.5vw, 1rem);
        }
    </style>
</head>

<body class="text-white flex items-center justify-center px-4">

    <div class="w-full max-w-[420px]">

        <!-- HEADER -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <p class="text-white/50 fluid-base">New account</p>
                <h1 class="fluid-title font-semibold">Create account</h1>
            </div>
            <a href="/" class="glass rounded-full px-3 py-2 text-sm hover:bg-white/10 transition">
                ← Back
            </a>
        </div>

        <!-- SIGN UP CARD -->
        <div class="glass shadow-soft rounded-3xl p-6">
            <form method="post" class="space-y-4">

                <div>
                    <label class="block text-white/60 text-sm mb-1">Username</label>
                    <input name="username" required
                        placeholder="Choose a username"
                        class="w-full glass-soft border border-white/10 px-4 py-3 rounded-xl
                               focus:outline-none focus:border-white/30 transition" />
                </div>

                <div>
                    <label class="block text-white/60 text-sm mb-1">Password</label>
                    <input name="password" type="password" required
                        placeholder="Create a password"
                        class="w-full glass-soft border border-white/10 px-4 py-3 rounded-xl
                               focus:outline-none focus:border-white/30 transition" />
                </div>

                <button
                    class="w-full mt-2 py-3 rounded-xl font-semibold
                           bg-white text-black hover:bg-white/90 active:scale-95 transition"
                >
                    Create account
                </button>
            </form>

            {% if error %}
            <p class="text-red-400 text-center mt-4 fluid-base">{{ error }}</p>
            {% endif %}
        </div>

        <!-- FOOTER -->
        <p class="text-center text-sm text-white/50 mt-6">
            Already have an account?
            <a href="/" class="underline hover:text-white transition">Sign in</a>
        </p>

    </div>

</body>
</html>
